name: Deploy React App

on:
  push:
    branches: [ "main" ] # Скрипт будет запускаться каждый раз, когда ты пушишь в ветку main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Указываем современную версию Node.js
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # Чистая установка библиотек без изменения package-lock.json

      - name: Build project
        run: npm run build
        env:
          PUBLIC_URL: './' # Помогает Реакту правильно находить пути к путям файлов на GitHub Pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build # Если ты используешь Vite, замени слово build на dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
